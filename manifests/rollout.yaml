apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        # Step 1: Shift 25% of traffic to the new version
        - setWeight: 25
        - pause: { duration: 120s }
        # Step 2: Shift 75% of traffic to the new version
        - setWeight: 75
        - pause: { duration: 120s }
        # Step 3: Shift all remaining traffic (100%)
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/sxammsonn/ci_cd_lab:latest
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
