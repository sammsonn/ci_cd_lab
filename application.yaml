apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-simple-webserver
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sammsonn/ci_cd_lab.git
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # Enable auto-sync
  syncPolicy:
    automated:
      prune: true     # Automatically delete resources that are no longer in the Git repository
      selfHeal: true  # Automatically revert manual changes made directly in the Kubernetes cluster
